<div class="app-container">
  <!-- Global Navigation Bar -->
  @if (showNavbar()) {
    <nav class="navbar">
      <div class="navbar-brand">
        <h1 class="brand-title clickable-title" (click)="navigateToDashboard()">📌 NoticeBoard</h1>
      </div>
      @if (currentUser) {
        <div class="navbar-user">
          <div class="user-info">
            <span class="user-name">{{ currentUser.fullName }}</span>
            <span class="user-role">{{ currentUser.role }}</span>
          </div>
          <div class="navbar-actions">
            @if (currentUser.role === 'admin') {
              <button mat-stroked-button class="btn-admin" (click)="navigateToAdmin()">
                Admin Panel
              </button>
            }
            <button mat-raised-button color="warn" class="btn-logout" (click)="logout()">Logout</button>
          </div>
        </div>
      }
    </nav>
  }

  <!-- Main Content -->
  <div class="main-content" [class.with-navbar]="showNavbar()">
    <router-outlet></router-outlet>
  </div>
</div>
