<div class="notices-container">
    <!-- Search and Filter Controls -->
    <div class="filter-controls">
        <div class="search-section">
            <mat-form-field appearance="outline" class="search-field">
                <mat-label>Search notices...</mat-label>
                <input 
                    matInput 
                    [value]="searchTerm()"
                    (input)="onSearchChange($event.target.value)"
                    placeholder="Search by title or content">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
            
            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Category</mat-label>
                <mat-select 
                    [value]="selectedCategory()"
                    (selectionChange)="onCategoryChange($event.value)">
                    <mat-option *ngFor="let category of categories" [value]="category">
                        {{ category | titlecase }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
            
            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Sort by</mat-label>
                <mat-select 
                    [value]="sortBy()"
                    (selectionChange)="onSortChange($event.value)">
                    <mat-option *ngFor="let option of sortOptions" [value]="option.value">
                        {{ option.label }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
            
            <button 
                mat-button 
                color="primary" 
                (click)="clearFilters()"
                class="clear-filters-btn">
                <mat-icon>clear</mat-icon>
                Clear Filters
            </button>
        </div>
    </div>

    <!-- Results Info -->
    <div class="results-info">
        <p>Showing {{ filteredNotices().length }} of {{ notices().length }} notices</p>
    </div>

    <div *ngIf="loading()">Loading notices...</div>
    <div *ngIf="errorMessage()" class="error-message">{{errorMessage()}}</div>
    <div class="notices-scroll-wrapper">
        <div *ngFor="let notice of filteredNotices()" class="notice-wrapper">
            <app-notice [notice]="notice"/>
        </div>
    </div>
</div>
